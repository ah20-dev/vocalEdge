timeout: '3600s'

steps:
# 1. Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  id: Build
  dir: 'finalscripts'
  args:
    - 'build'
    - '-t'
    - 'REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/IMAGE_NAME:TAG'
    - '.'

# 2. Push the Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  id: Push
  args:
    - 'push'
    - 'REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/IMAGE_NAME:TAG'

# 3. Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  id: Deploy
  args:
    - 'run'
    - 'deploy'
    - 'SERVICE_NAME'
    - '--image'
    - 'REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/IMAGE_NAME:TAG'
    - '--region'
    - 'REGION'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--set-env-vars'
    - 'OPENAI_API_KEY=SECRET_MANAGER_OPENAI_KEY:latest'
    - 'SUPABASE_URL=SECRET_MANAGER_SUPABASE_URL:latest'
    - 'SUPABASE_KEY=SECRET_MANAGER_SUPABASE_KEY:latest'
  availableSecrets:
    secretManager:
    - versionName: projects/PROJECT_ID/secrets/SECRET_MANAGER_OPENAI_KEY/versions/latest
      env: OPENAI_API_KEY
    - versionName: projects/PROJECT_ID/secrets/SECRET_MANAGER_SUPABASE_URL/versions/latest
      env: SUPABASE_URL
    - versionName: projects/PROJECT_ID/secrets/SECRET_MANAGER_SUPABASE_KEY/versions/latest
      env: SUPABASE_KEY
