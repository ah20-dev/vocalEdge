name: vocal_edge
description: AI-powered vocal coaching mobile app to enhance speaking skills
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  go_router: ^12.1.3
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # HTTP & API
  dio: ^5.3.2
  http_parser: ^4.0.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Audio Recording & Playback (Cross-platform)
  record: 4.4.4
  audioplayers: ^5.2.1
  just_audio: ^0.9.36
  
  # Cross-platform utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  path_provider: ^2.1.1
  
  # Charts & Analytics
  fl_chart: ^0.65.0
  
  # Image & Assets
  cached_network_image: ^3.3.0
  
  # Cross-platform integration
  url_launcher: ^6.2.1
  device_info_plus: ^9.1.0
  
  # Google Sign-In (alternative to Supabase OAuth)
  google_sign_in: ^6.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "app_icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "app_icon.png"
