name: vocal_edge
description: AI-powered vocal coaching mobile app to enhance speaking skills
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.9
  go_router: ^17.3.0
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.1.0
  
  # Supabase
  supabase_flutter: ^2.15.4
  
  # HTTP & API
  dio: ^5.10.0
  http_parser: ^4.0.2
  
  # Local Storage
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Audio Recording & Playback (Cross-platform)
  record: 7.1.1
  audioplayers: ^6.8.1
  just_audio: ^0.10.6
  
  # Cross-platform utilities
  intl: ^0.20.3
  uuid: ^4.5.3
  path_provider: ^2.1.6
  
  # Charts & Analytics
  fl_chart: ^1.2.0
  
  # Image & Assets
  cached_network_image: ^3.3.0
  
  # Cross-platform integration
  url_launcher: ^6.2.1
  device_info_plus: ^13.2.0
  
  # Google Sign-In (alternative to Supabase OAuth)
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "app_icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "app_icon.png"
